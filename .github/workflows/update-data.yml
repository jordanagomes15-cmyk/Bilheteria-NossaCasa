name: Atualizar dados

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/incoming/**"
      - "scripts/generate-data.py"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: npm install --ignore-scripts
      - name: Gerar dados
        env:
          NOSSA_CASA_DATA_DIR: data/incoming
        run: npm run generate:data
      - run: npm run build
      - name: Commit generated-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated-data.js
          if git diff --cached --quiet; then
            echo "Sem alteracoes em generated-data.js"
          else
            git commit -m "Atualiza dados gerados pelo GitHub Actions"
            git push
          fi
